name: Machine Learning CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train-and-build-docker:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
      MLFLOW_ALLOW_FILE_STORE: "true"
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: |
        pip install mlflow pandas numpy scikit-learn

    - name: Run MLflow Project (Training)
      run: |
        mlflow run MLProject --entry-point main --env-manager local --experiment-name "Digital_Marketing_Campaign_CI"

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image via MLflow
      run: |
        RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs(experiment_names=['Digital_Marketing_Campaign_CI'])['run_id'].iloc[0])")
        
        mlflow models build-docker -m "runs:/$RUN_ID/model" -n "journeyme/marketing-campaign-model:latest"
        
        docker push journeyme/marketing-campaign-model:latest